<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Mensaje recibido! — Nutri-Benefit</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .gracias-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--s16) var(--s6);
      text-align: center;
    }
    .gracias-inner { max-width: 560px; }
    .gracias-icon { font-size: 72px; margin-bottom: var(--s6); }
    .gracias-inner h1 {
      font-family: var(--font-serif);
      font-size: 42px;
      color: var(--green-dark);
      margin-bottom: var(--s4);
    }
    .gracias-inner p {
      font-size: 18px;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: var(--s8);
    }
  </style>
</head>
<body>
  <nav id="navbar" class="scrolled">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <span class="brand">Nutri-Benefit</span>
        <span class="tagline">Nutre tus victorias</span>
      </a>
    </div>
  </nav>

  <div class="gracias-wrap">
    <div class="gracias-inner">
      <div class="gracias-icon">🎾</div>
      <h1>¡Mensaje recibido!</h1>
      <p>Gracias por escribirme. Te responderé en menos de 24 horas para confirmar la llamada y que podamos hablar sobre cómo puedo ayudarte.</p>
      <a href="index.html" class="btn btn-primary">Volver al inicio</a>
    </div>
  </div>

  <script src="js/main.js" defer></script>
</body>
</html>
